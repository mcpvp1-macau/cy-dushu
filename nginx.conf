user root;
worker_processes auto;

error_log /home/jingansi/apps/logs/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    map $time_iso8601 $logdate {
        '~^(?<ymd>\d{4}-\d{2}-\d{2})' $ymd;
        default 'date-not-found';
    }

    # access_log logs/access-$logdate.log main;
    open_log_file_cache max=10;
    access_log /home/jingansi/apps/logs/access-$logdate.log main;
    # access_log /home/jingansi/apps/logs/access.log main;

    sendfile on;
    # tcp_nopush on;
    underscores_in_headers on;
    keepalive_timeout 65;

    gzip on;
    gzip_buffers 32 4K;
    gzip_comp_level 6;
    gzip_min_length 200;
    gzip_types application/javascript text/plain text/css application/json application/xml text/javascript;
    gzip_vary on;

    # ssl on;
    # ssl证书的pem文件路径
    # ssl_certificate /usr/share/nginx/ssl/9578351_jingqi.jing-an.com.pem;
    # ssl证书的key文件路径
    # ssl_certificate_key /usr/share/nginx/ssl/9578351_jingqi.jing-an.com.key;

    # ssl on;
    # ssl证书的pem文件路径
    ssl_certificate /home/jingansi/apps/config/test.dushu.jing-an.com.pem;
    # ssl证书的key文件路径
    ssl_certificate_key /home/jingansi/apps/config/test.dushu.jing-an.com.key;

    resolver 169.254.25.10 valid=10s ipv6=off;
    resolver_timeout 3s;

    upstream ja4anodeService {
        server ja-4a-node.ja.svc.cluster.local:7001 max_fails=1 fail_timeout=10s resolve;
    }

    upstream ja4aGoService {
        server ja-4a-go.ja.svc.cluster.local:7001 max_fails=1 fail_timeout=10s resolve;
    }

    upstream jingqiService {
        server ja-chingchi-icos.jingqi.svc.cluster.local:8081 max_fails=1 fail_timeout=10s resolve;
    }

    upstream jaStorageService {
        server ja-storage.ja.svc.cluster.local:8080 resolve max_fails=1 fail_timeout=10s;
    }

    upstream controlCenterService {
        server ja-control-center.jingqi.svc.cluster.local:32041 max_fails=1 fail_timeout=10s resolve;
    }

    upstream jingqTakiService {
        server ja-chingchi-icos.jingqi.svc.cluster.local:8443 max_fails=1 fail_timeout=10s resolve;
    }

    upstream tileServerService {
        server ja-tileserver-gl.ja.svc.cluster.local:8080 max_fails=1 fail_timeout=10s resolve;
    }

    upstream sentryService {
        server glitchtip-web.base.svc.cluster.local:80 resolve max_fails=1 fail_timeout=10s;
    }

    client_max_body_size 2000m;

    server {
        listen 7003 ssl;
        # listen 7003;
        server_name 127.0.0.1;

        location / {
            root /home/jingansi/apps/html;
            index index.html index.htm;
            try_files $uri /index.html;
        }

        location ~ ^/api/(\d+) {
            proxy_pass http://sentryService;
        }

        location /asr {
            proxy_pass http://172.22.219.29:10096; # 尝试 ws:// 可能会更好
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_redirect off;
        }

        location /humanLoopServer/ {
            # proxy_pass http://47.99.132.132:36009/;
            proxy_pass http://172.23.208.93:36009/;
        }

        location /ditingTanqiServer/ {
            proxy_pass http://api-diting-dev.jing-an.com:28080/;
            proxy_set_header tq-authorization sk-4e9betjXgdpdf23V3g2f5fef3gE52x3J11H4FFF;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 1d; # 延长后端响应超时
        }

        location /ditingMCPServer/ {
            proxy_pass http://api-mcp.jing-an.com:28080/;
            proxy_set_header tq-authorization sk-4e9betjXgdpdf23V3g2f5fef3gE52x3J11H4FFF;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 1d; # 延长后端响应超时
        }

        location /proxyApi/ja-test/ {
            proxy_pass http://jaStorageService/storage/ja-test/;
        }

        location /proxyApi/ja-media-storage/ {
            proxy_pass http://jaStorageService/storage/ja-media-storage/;
        }

        location /proxyApi/ {
            proxy_pass http://ja4aGoService/;
        }

        location /proxyWsApi/ {
            proxy_pass http://ja4aGoService/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
        }

        location /proxy4aApi/ {
            proxy_pass http://ja4anodeService/;
        }

        location /api {
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_pass http://172.23.208.91:3650;
        }

        location /stream {
            proxy_pass http://ja-media-dispatchengine.jingqi.svc.cluster.local:8080;
        }

        location /ja-map/ {
            proxy_pass http://test.4a.jing-an.com:32712/ja-map/;
        }

        location /data {
            proxy_set_header X-Forwarded-Proto https;
            # proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_pass http://61.153.111.197:32650;
        }

        location /tileData/ {
            proxy_set_header X-Forwarded-Proto https;
            # proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_pass http://tileServerService/;
        }

        location /api_tile {
            proxy_pass https://api.map.baidu.com;
            proxy_set_header X-Forwarded-Host $host;
        }

        location /map-server/ {
            # proxy_pass http://172.21.30.201:32729;
            add_header 'Access-Control-Allow-Origin' '*';
            proxy_pass http://47.111.155.82:32724/map-server/;
        }

        if ($request_uri ~ ^/wsProxy/(.*)) {
            set $backend_host http://$1;
        }

        location ^~ /wsProxy/ {
            proxy_pass $backend_host;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /ws {
            proxy_pass http://jingqiService/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
        }

        location /v3 {
            proxy_pass http://controlCenterService/v3;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
            proxy_set_header Origin "";
        }

        location /takServerWS {
            proxy_pass http://jingqTakiService/takproto/2;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
            proxy_set_header Origin "";
        }

        location /storage/ {
            proxy_pass http://jaStorageService/storage/;
        }

        location /_ws_proxy/ {
            # 被代理路径为域名需要指定dns
            # resolver 114.114.114.114 valid=3600s;

            # 通过正则截取路由中的 sub url
            if ($request_uri ~* "/_ws_proxy/(.*)") {
                set $proxy_url $1;
            }

            # 解析请求地址，并进行反向代理
            set $is_matched 0;
            if ($proxy_url ~* "^(http|ws)(s?):\/\/?([a-zA-Z0-9\-\.]+:?\d*)([^\?]*)(\?.*)?") {
                set $is_matched 1;
                set $proxy_protocol http$2;
                set $proxy_host $3;
                set $proxy_uri $4;
                set $proxy_args $5;
                set $proxy_url $proxy_protocol://$proxy_host/$proxy_uri$proxy_args;
                rewrite ^ / break;
                proxy_pass $proxy_url;
            }

            # Host 主机名，为了避免目标服务做限制此处采用目标地址的 Host
            proxy_set_header Host $proxy_host;
            # X-Real-IP 将真实访问者的远端 IP 地址转发给代理服务器
            proxy_set_header X-Real-IP $remote_addr;
            # X-Forwarded-For 标记客户端通过代理连接到服务器的源 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # X-Forwarded-Host 标记客户端通过代理连接到服务器的原始主机
            proxy_set_header X-Forwarded-Host $host:$server_port;
            # X-Forwarded-Server 代理服务器的主机名
            proxy_set_header X-Forwarded-Server $host;
            # X-Forwarded-Port 定义客户端请求的原始端口
            proxy_set_header X-Forwarded-Port $server_port;
            # X-Forwarded-Proto 标记客户端通过代理连接到服务器的协议
            proxy_set_header X-Forwarded-Proto $scheme;
            # proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
        }

        location /_proxy/ {
            # 被代理路径为域名需要指定dns
            # resolver 114.114.114.114 valid=3600s;

            # 通过正则截取路由中的 sub url
            if ($request_uri ~* "/_proxy/(.*)") {
                set $proxy_url $1;
            }

            # 解析请求地址，并进行反向代理
            set $is_matched 0;
            if ($proxy_url ~* "^(http|ws)(s?):\/\/?([a-zA-Z0-9\-\.]+:?\d*)([^\?]*)(\?.*)?") {
                set $is_matched 1;
                set $proxy_protocol http$2;
                set $proxy_host $3;
                set $proxy_uri $4;
                set $proxy_args $5;
                set $proxy_url $proxy_protocol://$proxy_host/$proxy_uri$proxy_args;
                rewrite ^ / break;
                proxy_pass $proxy_url;
            }

            # if ($is_matched = 1) {
            #     return 200 '{"code": 404, "message": "已经匹配到了!", "proxy_url": $proxy_url}';
            # }
            # if ($is_matched = 0) {
            #     return 200 '{"code": 404, "message": "The proxy url is invalid!", "proxy_url": $proxy_url}';
            # }

            # Host 主机名，为了避免目标服务做限制此处采用目标地址的 Host
            proxy_set_header Host $proxy_host;
            # X-Real-IP 将真实访问者的远端 IP 地址转发给代理服务器
            proxy_set_header X-Real-IP $remote_addr;
            # X-Forwarded-For 标记客户端通过代理连接到服务器的源 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # X-Forwarded-Host 标记客户端通过代理连接到服务器的原始主机
            proxy_set_header X-Forwarded-Host $host:$server_port;
            # X-Forwarded-Server 代理服务器的主机名
            proxy_set_header X-Forwarded-Server $host;
            # X-Forwarded-Port 定义客户端请求的原始端口
            proxy_set_header X-Forwarded-Port $server_port;
            # X-Forwarded-Proto 标记客户端通过代理连接到服务器的协议
            proxy_set_header X-Forwarded-Proto $scheme;
            # proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_read_timeout 600s;
        }

        location /upload/ {
            proxy_pass http://172.27.95.212:32000/;
        }

        location /geoserver {
            proxy_pass http://172.22.219.30:31880;
        }
    }

    server {
        listen 7004 ssl;
        server_name 127.0.0.1;

        location = /js/config.js {
            proxy_pass https://127.0.0.1:7003/js/config7004.js;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass https://127.0.0.1:7003;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
        }
    }

    # gzip on;

    include /etc/nginx/conf.d/*.conf;
}
