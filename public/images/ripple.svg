<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 用渐变做光晕的描边 -->
    <radialGradient id="ringStrokeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#d42422" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d42422" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景透明，中间空心，只画发光的边缘 -->
  <circle
    cx="128"
    cy="128"
    r="80"
    fill="none"
    stroke="url(#ringStrokeGradient)"
    stroke-width="32"
  />
</svg>
